# Disk layout configuration — target: 16 GB micro SD card.
#
# All sizes are in mebibytes (MiB).
# 15360 MiB = 15 GiB ≈ 14.3 GB, fitting safely on a 16 GB micro SD card.
#
# IMPORTANT: values are MiB (1024-based), NOT MB (1000-based).

disk_size_mib=15360
efi_partition_size_mib=512

# Keep swap small on space-constrained media.
swap_size_mib=1024
