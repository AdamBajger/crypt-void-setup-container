# Disk layout configuration — target: 128 GB micro SD card.
#
# All sizes are in mebibytes (MiB).
# 122880 MiB = 120 GiB ≈ 114.4 GB, fitting safely on a 128 GB micro SD card.
#
# IMPORTANT: values are MiB (1024-based), NOT MB (1000-based).

disk_size_mib=122880
efi_partition_size_mib=512
swap_size_mib=8192
