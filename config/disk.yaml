# Disk layout configuration — default target: 64 GB micro SD card.
#
# All sizes are in mebibytes (MiB).
# The LUKS partition fills whatever space remains after the EFI and boot
# partitions. The root logical volume fills whatever space remains after swap.
#
# See the examples/ directory for configurations targeting other device sizes.

# Total usable size to allocate for the disk image.
# 61440 MiB ≈ 60 GiB, which fits safely on a 64 GB micro SD card.
disk_size_mb: 61440

# EFI System Partition (ESP) — formatted as FAT32, mounted at /boot/efi.
efi_partition_size_mb: 512

# Unencrypted boot partition — formatted as ext4, mounted at /boot.
boot_partition_size_mb: 512

# Swap logical volume inside the encrypted LVM volume group.
swap_size_mb: 4096
