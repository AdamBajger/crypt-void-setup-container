# Disk layout configuration — target: 256 GB micro SD card / USB drive.
#
# All sizes are in mebibytes (MiB).
# 245760 MiB = 240 GiB ≈ 228.9 GB, fitting safely on a 256 GB device.
#
# IMPORTANT: values are MiB (1024-based), NOT MB (1000-based).

disk_size_mib=245760
efi_partition_size_mib=512
swap_size_mib=8192
