services:
  void-setup:
    build:
      dockerfile: Dockerfile
      context: .
      args:
        - VOID_XBPS_REPOSITORY=${VOID_XBPS_REPOSITORY:-"https://repo-default.voidlinux.org/current"}
    container_name: void-setup-container
    # Privileged mode is required for loop device management, dm-crypt, and LVM.
    privileged: true
    volumes:
      # Mount your configuration directory (read-only).
      - ./config:/config:ro
      # Mount pre-downloaded binaries (read-only).
      - ./binaries:/binaries:ro
      # Mount the output directory where the final disk image will be saved.
      - ./output:/output
      # Mount the scripts directory so changes take effect without rebuilding.
      - ./scripts:/setup
      # Mount helper tools (read-only).
      - ./tools:/tools:ro
    environment:
      # Passwords are supplied exclusively through environment variables and
      # must never be stored in configuration files or committed to source control.
      - LUKS_PASSWORD=${LUKS_PASSWORD}
      - ROOT_PASSWORD=${ROOT_PASSWORD}
      - USER_PASSWORD=${USER_PASSWORD}
      - VOID_XBPS_REPOSITORY=${VOID_XBPS_REPOSITORY:-"https://repo-default.voidlinux.org/current"}
