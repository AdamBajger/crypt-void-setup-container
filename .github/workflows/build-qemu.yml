name: Build (QEMU)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU
        run: sudo apt-get install -y qemu-system-x86 libarchive-tools

      - name: Enable KVM access
        run: sudo chmod 666 /dev/kvm

      - name: Load kernel modules
        run: |
          sudo modprobe dm-mod
          sudo modprobe dm-crypt
          sudo modprobe loop

      - name: Download Void Linux ISO
        run: wrappers/qemu-setup-vm.sh
        env:
          VOID_ISO_URL: "https://repo-default.voidlinux.org/live/current/void-live-x86_64-20250202-base.iso"

      - name: Run build in QEMU
        run: wrappers/qemu-run-build.sh
        env:
          LUKS_PASSWORD: ${{ secrets.LUKS_PASSWORD }}
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          VOID_XBPS_REPOSITORY: ${{ vars.VOID_XBPS_REPOSITORY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: void-fde-image-qemu-${{ github.run_number }}
          path: output/voidlinux_fde_*.img
          retention-days: 30
          if-no-files-found: error
