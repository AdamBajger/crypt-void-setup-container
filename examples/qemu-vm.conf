# Disk layout configuration — target: QEMU CI virtual disk.
#
# Used by the QEMU CI workflow — a small VM disk just large enough to
# boot and prove the install pipeline works.
#
# Inside the VM the target device is /dev/vda (the QEMU virtio disk);
# the entrypoint reads VOID_TARGET_DEVICE=/dev/vda from the environment
# rather than from this file.
#
# All sizes are in mebibytes (MiB). 16384 MiB = 16 GiB.
#
# IMPORTANT: values are MiB (1024-based), NOT MB (1000-based).

disk_size_mib=16384
efi_partition_size_mib=512
swap_size_mib=2048
